name: Delta ATL Deal Scanner - 4x Daily with Email

on:
  schedule:
    # 9 AM, 1 PM, 6 PM, 10 PM UTC
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Download previous alerts
        uses: actions/download-artifact@v3
        with:
          name: delta-deal-alerts
          path: .
        continue-on-error: true
      
      - name: 🎯 Scan for Delta ATL deals and send email
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: python delta_deal_scanner.py
      
      - name: Upload alerts for next run
        uses: actions/upload-artifact@v3
        with:
          name: delta-deal-alerts
          path: /tmp/delta_deals.json
          retention-days: 7
        continue-on-error: true
